name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Optional deployment target"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - dev
          - staging
          - prod

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  quality:
    name: Lint And Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff formatting check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Unit and integration tests
        run: uv run pytest

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Bandit source scan
        run: uv run --with bandit bandit -r src

      - name: Dependency vulnerability audit
        run: uv run --with pip-audit pip-audit

  docker:
    name: Docker Build And Smoke Test
    runs-on: ubuntu-latest
    needs:
      - quality
      - security

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: dynamic-data-masking:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test API health
        run: |
          docker run --rm -d --name ddm-api-ci -p 8000:8000 dynamic-data-masking:ci
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/api/health; then
              docker logs ddm-api-ci
              docker stop ddm-api-ci
              exit 0
            fi
            sleep 2
          done
          docker logs ddm-api-ci
          docker stop ddm-api-ci
          exit 1

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Placeholder
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_environment != 'none'
    environment: ${{ inputs.deploy_environment }}

    steps:
      - name: Deployment gate
        run: |
          echo "Image ready: $IMAGE_NAME:${{ github.sha }}"
          echo "Target environment: ${{ inputs.deploy_environment }}"
          echo "Replace this placeholder with the dev/staging/prod deployment command."
