services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    image: dynamic-data-masking:dev
    depends_on:
      - redis
    environment:
      DDM_API_HOST: 0.0.0.0
      DDM_API_PORT: 8000
      DDM_API_RELOAD: "false"
      DDM_ENVIRONMENT: compose
      DDM_DATA_ROOT: /app/data
      DDM_DATABASE_URL: sqlite:////app/data/metadata.sqlite3
      DDM_OBJECT_STORE_BACKEND: local
      DDM_OBJECT_STORE_ROOT: /app/data/objects
      DDM_QUEUE_BROKER_URL: redis://redis:6379/0
      DDM_QUEUE_RESULT_BACKEND: redis://redis:6379/1
      DDM_QUEUE_NAME: ddm
    ports:
      - "8000:8000"
    volumes:
      - ddm-data:/app/data

  worker:
    image: dynamic-data-masking:dev
    depends_on:
      - redis
    command: ["/app/.venv/bin/ddm-worker"]
    environment:
      DDM_ENVIRONMENT: compose
      DDM_DATA_ROOT: /app/data
      DDM_DATABASE_URL: sqlite:////app/data/metadata.sqlite3
      DDM_OBJECT_STORE_BACKEND: local
      DDM_OBJECT_STORE_ROOT: /app/data/objects
      DDM_QUEUE_BROKER_URL: redis://redis:6379/0
      DDM_QUEUE_RESULT_BACKEND: redis://redis:6379/1
      DDM_QUEUE_NAME: ddm
      DDM_WORKER_POOL: solo
    volumes:
      - ddm-data:/app/data

volumes:
  ddm-data:
